<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join</title>
  <link rel="stylesheet" href="styles/large.css">
</head>
<body>
  <header>
    <h1>Thank you</h1>
    
    <nav>
      <div class="menu-toggle">
        <i class="fas fa-bars"></i>
      </div>
      <div class="menu-links">
        <a href="index.html">Home</a>
        <a href="join.html">Join</a>
        <a href="thankyou.html">thankyou</a>
      </div>
    </nav>
  </header>

  <main>
    <h1>Join Our Membership</h1>
    <form action="thankyou.html" method="get">
      <label for="first-name">First Name:</label>
      <input type="text" id="first-name" name="first-name" required>

      <label for="last-name">Last Name:</label>
      <input type="text" id="last-name" name="last-name" required>

      <label for="position">Business Position Title:</label>
      <input type="text" id="position" name="position" pattern="[a-zA-Z\s\-]{7,}" title="Please enter at least 7 alphabetical characters, hyphens, or spaces.">

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="example@example.com" required>

      <label for="cell-phone">Cell Phone Number:</label>
      <input type="tel" id="cell-phone" name="cell-phone" required>

      <label for="business-name">Business Name/Title:</label>
      <input type="text" id="business-name" name="business-name" required>

      <label for="membership-level">Membership Level:</label>
      <select id="membership-level" name="membership-level">
        <option value="NP">NP Membership (Non-Profit)</option>
        <option value="Bronze">Bronze Membership</option>
        <option value="Silver">Silver Membership</option>
        <option value="Gold">Gold Membership</option>
      </select>

      <label for="business-description">Business Description:</label>
      <textarea id="business-description" name="business-description" rows="4"></textarea>

      <input type="hidden" id="form-loaded-date" name="form-loaded-date" value="">

      <input type="submit" value="Submit">
    </form>
  </main>

  <footer>
    <p>wdd230: Gabriel A Mirah | Site Plan | nairobichamberofcommerce | @2023</p>
  </footer>

  <script src="scripts/scripts.js"></script>
</body>
</html>
